
  <!DOCTYPE html>
  <html lang="en">
    <head>
      
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>360 Performance | Genuine Motorsports Parts in Pakistan</title>
      <meta name="description" content="Genuine performance car parts in Pakistan — exhausts, turbos, cooling, suspension and more. Shipped nationwide. Order on WhatsApp." />
      <meta name="robots" content="index, follow" />
      <meta name="theme-color" content="#cc0000" />
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <link rel="apple-touch-icon" href="/favicon.svg" />
      <!-- Brand faces are self-hosted (see styles/fonts.css). Preload the two on the critical path so
           the condensed display type is not swapped in late. `crossorigin` is required even
           same-origin: font fetches are always CORS-mode. -->
      <link rel="preload" as="font" type="font/woff2" href="/fonts/oswald-var.woff2" crossorigin />
      <link rel="preload" as="font" type="font/woff2" href="/fonts/lato-400.woff2" crossorigin />
      <!-- Social share defaults. og:image MUST be ABSOLUTE — WhatsApp/Facebook/Twitter scrapers do
           not run JS and will not resolve a relative path, so a relative URL means no preview image
           at all. Vite substitutes %VITE_SITE_URL% at build time; it must be set in the build env. -->
      <meta property="og:site_name" content="360 Performance" />
      <meta property="og:type" content="website" />
      <meta property="og:url" content="%VITE_SITE_URL%/" />
      <meta property="og:title" content="360 Performance | Genuine Motorsports Parts in Pakistan" />
      <meta property="og:description" content="Genuine performance car parts in Pakistan — exhausts, turbos, cooling, suspension and more. Shipped nationwide. Order on WhatsApp." />
      <meta property="og:image" content="%VITE_SITE_URL%/og-card.png" />
      <meta property="og:image:width" content="1200" />
      <meta property="og:image:height" content="630" />
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:title" content="360 Performance | Genuine Motorsports Parts in Pakistan" />
      <meta name="twitter:description" content="Genuine performance car parts in Pakistan — shipped nationwide. Order on WhatsApp." />
      <meta name="twitter:image" content="%VITE_SITE_URL%/og-card.png" />
      <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
      
    </head>

    <body>
      
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
      
    </body>
  </html>
